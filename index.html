<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Today's Recording</title>
<style>
  :root{
    --bg:#f6efe4;          /* warm paper */
    --ink:#2b2620;         /* soft near-black */
    --go:#2f7d4f;          /* calm green */
    --go-press:#256240;
    --stop:#b23b34;        /* warm red */
    --stop-press:#93302a;
    --amber:#c07a1e;
    --card:#fffdf8;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column;
    min-height:100dvh;
    padding:24px 20px calc(24px + env(safe-area-inset-bottom));
  }
  header{ text-align:center; margin-top:8px; }
  .hello{ font-size:1.6rem; font-weight:700; margin:0 0 6px; }
  .instruction{ font-size:1.25rem; line-height:1.4; margin:0 auto; max-width:20ch; opacity:.85; }

  main{ flex:1; display:flex; flex-direction:column; justify-content:center; gap:22px; }

  .timer{ text-align:center; font-size:2.6rem; font-weight:700; font-variant-numeric:tabular-nums; min-height:1.2em; letter-spacing:1px; }
  .timer.hidden{ visibility:hidden; }

  .bigbtn{
    display:flex; align-items:center; justify-content:center;
    width:100%; min-height:42vh; border:none; border-radius:28px;
    font-size:2.3rem; font-weight:800; color:#fff; cursor:pointer;
    box-shadow:0 8px 0 rgba(0,0,0,.14); transition:transform .05s ease, background .15s ease;
    line-height:1.2; text-align:center; padding:20px;
  }
  .bigbtn:active{ transform:translateY(4px); box-shadow:0 4px 0 rgba(0,0,0,.14); }
  .bigbtn:focus-visible{ outline:5px solid #1d4ed8; outline-offset:4px; }
  .bigbtn.go{ background:var(--go); }
  .bigbtn.go:active{ background:var(--go-press); }
  .bigbtn.stop{ background:var(--stop); }
  .bigbtn.stop:active{ background:var(--stop-press); }
  .bigbtn:disabled{ background:#9a938a; box-shadow:0 8px 0 rgba(0,0,0,.1); cursor:default; }

  .rec-ring{ display:inline-block; width:22px; height:22px; border-radius:50%; background:#fff; margin-right:14px; }
  @media (prefers-reduced-motion: no-preference){
    .stop .rec-ring{ animation:pulse 1.1s ease-in-out infinite; }
    @keyframes pulse{ 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.35; transform:scale(.7);} }
  }

  .panel{ text-align:center; background:var(--card); border-radius:24px; padding:34px 24px; box-shadow:0 6px 24px rgba(0,0,0,.08); }
  .panel .mark{ font-size:4rem; line-height:1; margin-bottom:10px; }
  .panel h2{ font-size:1.9rem; margin:0 0 8px; }
  .panel p{ font-size:1.3rem; margin:0; opacity:.85; }
  .again{ margin-top:26px; background:none; border:none; color:#1d4ed8; font-size:1.25rem; text-decoration:underline; padding:12px; cursor:pointer; }

  .retry{ background:var(--amber); }
  .retry:active{ background:#9c6215; }

  .hidden{ display:none !important; }
</style>
</head>
<body>

<header>
  <p class="hello">Hi Gags 💛</p>
  <p class="instruction" id="topText">Tap the green button, talk, then tap Stop.</p>
</header>

<main>
  <div class="timer hidden" id="timer">00:00</div>

  <!-- Record / Stop -->
  <button class="bigbtn go" id="mainBtn">Start recording</button>

  <!-- Saving -->
  <button class="bigbtn" id="savingBtn" disabled hidden>Saving…</button>

  <!-- Done -->
  <div class="panel hidden" id="donePanel">
    <div class="mark">✓</div>
    <h2>Saved!</h2>
    <p>Thank you. You can close this now.</p>
    <button class="again" id="againBtn">Record again</button>
  </div>

  <!-- Error -->
  <div class="hidden" id="errorWrap">
    <div class="panel" style="margin-bottom:18px;">
      <div class="mark">⚠️</div>
      <h2 id="errTitle">That didn't save</h2>
      <p id="errText">Check the internet and tap the button below.</p>
    </div>
    <button class="bigbtn retry" id="retryBtn">Try again</button>
  </div>
</main>

<script>
/* =========================================================
   PASTE YOUR GOOGLE APPS SCRIPT URL BETWEEN THE QUOTES BELOW.
   (You get this in Step 3 of the setup instructions.)
   ========================================================= */
const SCRIPT_URL = "PASTE_YOUR_SCRIPT_URL_HERE";

const els = {
  top: document.getElementById('topText'),
  timer: document.getElementById('timer'),
  main: document.getElementById('mainBtn'),
  saving: document.getElementById('savingBtn'),
  done: document.getElementById('donePanel'),
  again: document.getElementById('againBtn'),
  errorWrap: document.getElementById('errorWrap'),
  errTitle: document.getElementById('errTitle'),
  errText: document.getElementById('errText'),
  retry: document.getElementById('retryBtn'),
};

let mediaRecorder, chunks = [], stream = null;
let mime = '', ext = 'm4a';
let timerInt, seconds = 0;
let lastBlob = null;      // kept so a failed upload can be retried without losing audio

function pickMime(){
  const types = ['audio/mp4','audio/aac','audio/webm','audio/ogg'];
  for(const t of types){
    if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}
function extFor(m){
  if(m.includes('webm')) return 'webm';
  if(m.includes('ogg'))  return 'ogg';
  return 'm4a'; // mp4 / aac / default (iPhone lands here)
}

function show(state){
  els.timer.classList.toggle('hidden', state !== 'recording');
  els.main.hidden   = !(state === 'idle' || state === 'recording');
  els.saving.hidden = state !== 'saving';
  els.done.classList.toggle('hidden', state !== 'done');
  els.errorWrap.classList.toggle('hidden', state !== 'error');

  if(state === 'idle'){
    els.main.className = 'bigbtn go';
    els.main.textContent = 'Start recording';
    els.top.textContent = 'Tap the green button, talk, then tap Stop.';
  }
  if(state === 'recording'){
    els.main.className = 'bigbtn stop';
    els.main.innerHTML = '<span class="rec-ring"></span>Stop recording';
    els.top.textContent = "I'm listening… tap Stop when you're done.";
  }
  if(state === 'saving') els.top.textContent = 'Please wait a moment…';
  if(state === 'done')   els.top.textContent = '';
  if(state === 'error')  els.top.textContent = '';
}

function fmt(s){
  const m = String(Math.floor(s/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  return m + ':' + ss;
}
function startTimer(){
  seconds = 0; els.timer.textContent = '00:00';
  timerInt = setInterval(()=>{ seconds++; els.timer.textContent = fmt(seconds); }, 1000);
}
function stopTimer(){ clearInterval(timerInt); }

async function startRecording(){
  try{
    if(!stream){
      stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    }
  }catch(e){
    els.errTitle.textContent = 'Microphone is off';
    els.errText.textContent = 'Please allow the microphone, then tap Try again.';
    show('error');
    return;
  }
  mime = pickMime();
  ext = extFor(mime);
  chunks = [];
  try{
    mediaRecorder = mime ? new MediaRecorder(stream, { mimeType:mime })
                         : new MediaRecorder(stream);
  }catch(e){
    mediaRecorder = new MediaRecorder(stream);
  }
  mediaRecorder.ondataavailable = e => { if(e.data && e.data.size) chunks.push(e.data); };
  mediaRecorder.onstop = onStopped;
  mediaRecorder.start();
  startTimer();
  show('recording');
}

function onStopped(){
  stopTimer();
  const type = mime || 'audio/mp4';
  lastBlob = new Blob(chunks, { type });
  releaseMic();
  upload(lastBlob);
}

function releaseMic(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream = null; }
}

function blobToBase64(blob){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=> res(String(r.result).split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

async function upload(blob){
  show('saving');
  if(SCRIPT_URL.indexOf('PASTE_YOUR') === 0){
    els.errTitle.textContent = 'Not set up yet';
    els.errText.textContent = 'The saving address is missing.';
    show('error');
    return;
  }
  try{
    const b64 = await blobToBase64(blob);
    const body = new URLSearchParams();
    body.set('audio', b64);
    body.set('mime', blob.type || mime || 'audio/mp4');
    body.set('ext', ext);
    const resp = await fetch(SCRIPT_URL, { method:'POST', body });
    const json = await resp.json();
    if(!json || !json.ok) throw new Error('server');
    show('done');
  }catch(e){
    els.errTitle.textContent = "That didn't save";
    els.errText.textContent = 'Check the internet and tap the button below.';
    show('error');
  }
}

/* Buttons */
els.main.addEventListener('click', ()=>{
  if(mediaRecorder && mediaRecorder.state === 'recording'){
    mediaRecorder.stop();
  } else {
    startRecording();
  }
});
els.again.addEventListener('click', ()=> show('idle'));
els.retry.addEventListener('click', ()=>{
  if(lastBlob) upload(lastBlob);   // don't lose the recording
  else show('idle');
});

show('idle');
</script>
</body>
</html>
